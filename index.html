<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VA Research | Alpha Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #050505;
            --primary-yellow: #ffcc00;
            --text-white: #ffffff;
            --text-gray: #777;
            --border-color: #1a1a1a;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-black);
            font-family: 'Inter', sans-serif;
            color: var(--text-white);
            overflow-x: hidden;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(5,5,5,0.4) 0%, rgba(5,5,5,0.95) 100%);
            z-index: 2; pointer-events: none;
        }

        .wrapper { 
            position: relative; 
            z-index: 10; 
            display: flex; 
            width: 100%; 
            min-height: 100vh; 
        }

        .left-panel {
            flex: 0 0 75%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 8%;
            box-sizing: border-box;
        }

        .right-panel {
            flex: 0 0 25%;
            border-left: 1px solid var(--border-color);
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
        }

        /* --- BRANDING REFINED --- */
        .brand-wrapper { 
            display: flex; 
            align-items: center; 
            gap: 16px; /* Slightly more gap for the larger logo */
            margin-bottom: 35px; 
        }
        .logo-square { 
            background: var(--primary-yellow); 
            color: black; 
            font-weight: 900; 
            font-size: 2.2rem; /* Larger VA logo */
            padding: 6px 15px; 
            border-radius: 4px; 
            line-height: 1;
        }
        .brand-name { 
            font-size: 1.4rem; /* Balanced size */
            font-weight: 700; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            color: var(--text-white);
        }

        h1 { font-size: clamp(2.2rem, 8vw, 5rem); font-weight: 900; line-height: 0.95; margin: 0; text-transform: uppercase; }
        .highlight { color: var(--primary-yellow); }
        .sub-text { color: var(--text-gray); font-size: clamp(0.9rem, 2vw, 1.1rem); max-width: 500px; margin: 25px 0; line-height: 1.6; }

        .input-group { 
            display: flex; 
            background: #fff; 
            padding: 3px; 
            border-radius: 4px; 
            width: 100%; 
            max-width: 450px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input[type="email"] { flex: 1; border: none; padding: 12px 15px; font-size: 1rem; font-weight: 600; outline: none; color: #000; width: 100%; }
        .btn-submit { background: #000; color: #fff; border: none; padding: 0 25px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { background: var(--primary-yellow); color: #000; }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 1024px) {
            .wrapper { flex-direction: column; }
            .left-panel { flex: 1; padding: 60px 5%; align-items: center; text-align: center; }
            .brand-wrapper { justify-content: center; }
            .right-panel { width: 100%; border-left: none; border-top: 1px solid var(--border-color); padding: 30px 5%; }
        }
    </style>
</head>
<body>

    <canvas id="candleCanvas"></canvas>
    <div class="overlay"></div>

    <div class="wrapper">
        <div class="left-panel">
            <div class="brand-wrapper">
                <div class="logo-square">VA</div>
                <div class="brand-name">RESEARCH.TRADE</div>
            </div>

            <h1>WE ARE<br><span class="highlight">LAUNCHING SOON</span></h1>
            <p class="sub-text">Institutional-grade trading intelligence and actionable research terminal. Secure your spot for early alpha access.</p>
            
            <form id="launch-form" action="https://formspree.io/f/xjgeeolg" method="POST" class="input-group">
                <input type="email" name="email" id="email-input" placeholder="ENTER EMAIL ADDRESS" required>
                <button type="submit" id="submit-btn" class="btn-submit">SUBMIT</button>
            </form>
        </div>

        <div class="right-panel">
            <div style="font-size: 0.65rem; color: var(--primary-yellow); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px;">
                <div style="width: 6px; height: 6px; background: var(--primary-yellow); border-radius: 50%;"></div> Intelligence Feed
            </div>
            <div id="tip-text" style="font-family: 'Roboto Mono', monospace; font-size: 0.95rem; line-height: 1.5; color: #efefef;">Synchronizing terminal...</div>
        </div>
    </div>

    </body>
</html>
