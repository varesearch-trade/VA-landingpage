<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VA Research | Alpha Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #050505;
            --primary-yellow: #ffcc00;
            --text-white: #ffffff;
            --text-gray: #777;
            --border-color: #1a1a1a;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-black);
            font-family: 'Inter', sans-serif;
            color: var(--text-white);
            overflow: hidden;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(5,5,5,0.95) 0%, rgba(5,5,5,0.6) 50%, rgba(5,5,5,0.95) 100%);
            z-index: 2; pointer-events: none;
        }

        /* --- LAYOUT --- */
        .wrapper { position: relative; z-index: 10; display: flex; width: 100%; height: 100vh; }

        .left-panel {
            flex: 0 0 75%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 8%;
            box-sizing: border-box;
        }

        .right-panel {
            flex: 0 0 25%;
            border-left: 1px solid var(--border-color);
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
        }

        /* --- SUCCESS POPUP --- */
        .success-popup {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid var(--primary-yellow);
            padding: 15px 30px;
            z-index: 1000;
            transition: top 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.3);
            border-radius: 4px;
        }
        .success-popup.show { top: 30px; }
        .success-content { font-family: 'Roboto Mono', monospace; font-weight: bold; font-size: 0.9rem; }

        /* --- BRANDING --- */
        .brand-wrapper { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .logo-square { background: var(--primary-yellow); color: black; font-weight: 900; font-size: 1.8rem; padding: 5px 12px; border-radius: 3px; }
        .brand-name { font-size: 1.4rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }

        h1 { font-size: clamp(3rem, 7vw, 5.5rem); font-weight: 900; line-height: 0.95; margin: 0; text-transform: uppercase; }
        .highlight { color: var(--primary-yellow); }
        .sub-text { color: var(--text-gray); font-size: 1.1rem; max-width: 550px; margin: 30px 0; line-height: 1.5; }

        /* --- FORM --- */
        .input-group { display: flex; background: #fff; padding: 4px; border-radius: 2px; width: 100%; max-width: 480px; }
        input[type="email"] { flex: 1; border: none; padding: 15px 20px; font-size: 1rem; font-weight: 600; outline: none; color: #000; }
        .btn-submit { background: #000; color: #fff; border: none; padding: 0 30px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { background: var(--primary-yellow); color: #000; }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- FEED --- */
        .feed-label { font-size: 0.7rem; color: var(--primary-yellow); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .live-dot { width: 8px; height: 8px; background: var(--primary-yellow); border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        #tip-text { font-family: 'Roboto Mono', monospace; font-size: 1.1rem; line-height: 1.6; color: #efefef; min-height: 150px; }

        @media (max-width: 1024px) {
            .wrapper { flex-direction: column; }
            .left-panel { flex: 0 0 60%; padding: 40px; }
            .right-panel { flex: 0 0 40%; border-left: none; border-top: 1px solid var(--border-color); }
        }
    </style>
</head>
<body>

    <div id="success-notification" class="success-popup">
        <div class="success-content"><span class="highlight">SYSTEM:</span> ACCESS GRANTED. WELCOME TO ALPHA.</div>
    </div>

    <canvas id="candleCanvas"></canvas>
    <div class="overlay"></div>

    <div class="wrapper">
        <div class="left-panel">
            <div class="brand-wrapper">
                <div class="logo-square">VA</div>
                <div class="brand-name">VAresearch.trade</div>
            </div>
            <h1>WE ARE<br><span class="highlight">LAUNCHING SOON</span></h1>
            <p class="sub-text">Institutional-grade trading intelligence and actionable research terminal. Secure your spot for early alpha access.</p>
            
            <form id="launch-form" action="https://formspree.io/f/xjgeeolg" method="POST" class="input-group">
                <input type="email" name="email" id="email-input" placeholder="ENTER EMAIL ADDRESS" required>
                <button type="submit" id="submit-btn" class="btn-submit">SUBMIT</button>
            </form>
        </div>

        <div class="right-panel">
            <div class="feed-label"><div class="live-dot"></div> Intelligence Feed</div>
            <div id="tip-text">Synchronizing terminal...</div>
        </div>
    </div>

    <script>
        // --- CANDLESTICK BACKGROUND ---
        const canvas = document.getElementById('candleCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, candles = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            candles = [];
            let lastClose = height / 2;
            for (let i = 0; i < Math.ceil(width / 34); i++) {
                const open = lastClose;
                const close = open + (Math.random() - 0.5) * 120;
                candles.push({ x: i * 34, open, close, high: Math.min(open, close) - 20, low: Math.max(open, close) + 20,
                    color: close < open ? 'rgba(34, 197, 94, 0.25)' : 'rgba(239, 68, 68, 0.25)'
                });
                lastClose = close;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            candles.forEach(c => {
                ctx.strokeStyle = c.color; ctx.fillStyle = c.color;
                ctx.beginPath(); ctx.moveTo(c.x + 11, c.high); ctx.lineTo(c.x + 11, c.low); ctx.stroke();
                ctx.fillRect(c.x, Math.min(c.open, c.close), 22, Math.max(Math.abs(c.open - c.close), 1));
                c.open += (Math.random() - 0.5) * 0.4; c.close += (Math.random() - 0.5) * 0.4;
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init(); draw();

        // --- INTELLIGENCE FEED ---
        const tips = [
            "STRATEGY: RSI divergence suggests upcoming reversal on Gold 1H.",
            "ANALYSIS: Liquidity grab confirmed at $67,200 support zone.",
            "ALERT: DXY showing weakness; potential bullish move for BTC.",
            "INSIGHT: Institutional order flow shifting to defensive assets.",
            "RISK: High volatility expected during the NY market open.",
            "SETUP: Breakout confirmed on 4H descending triangle pattern."
        ];
        let tipIdx = 0;
        function rotateTips() {
            const el = document.getElementById('tip-text');
            el.style.opacity = 0;
            setTimeout(() => {
                el.textContent = tips[tipIdx];
                el.style.opacity = 1;
                tipIdx = (tipIdx + 1) % tips.length;
            }, 500);
        }
        setInterval(rotateTips, 5000); rotateTips();

        // --- AJAX FORM SUBMISSION (No Page Change) ---
        const form = document.getElementById("launch-form");
        const btn = document.getElementById("submit-btn");
        const input = document.getElementById("email-input");
        const popup = document.getElementById('success-notification');

        form.addEventListener("submit", async function(event) {
            event.preventDefault(); // Stop page from redirecting
            
            btn.disabled = true;
            btn.textContent = "...";

            const data = new FormData(event.target);
            
            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    // Success!
                    popup.classList.add('show');
                    form.reset();
                    setTimeout(() => { popup.classList.remove('show'); }, 5000);
                } else {
                    alert("Error. Please try again.");
                }
            }).catch(error => {
                alert("Connection error.");
            }).finally(() => {
                btn.disabled = false;
                btn.textContent = "SUBMIT";
            });
        });
    </script>
</body>
</html>
