<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VA RESEARCH | Institutional Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #080808;
            --primary-yellow: #ffcc00;
            --text-white: #ffffff;
            --border-color: rgba(255, 204, 0, 0.15);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-black);
            font-family: 'Inter', sans-serif;
            color: var(--text-white);
            overflow: hidden;
        }

        /* --- QUANTITATIVE PRICE MATRIX --- */
        #price-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            font-family: 'Roboto Mono', monospace;
            font-size: 9px;
            color: rgba(255, 204, 0, 0.06);
            line-height: 1.8;
            overflow: hidden;
            user-select: none;
            z-index: 0;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; opacity: 0.7; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 50%, rgba(8,8,8,0.05) 0%, rgba(8,8,8,0.98) 100%);
            z-index: 2; pointer-events: none;
        }

        .wrapper { 
            position: relative; 
            z-index: 10; 
            display: flex; 
            width: 100%; 
            height: 100vh; 
        }

        .brand-wrapper { display: flex; align-items: center; gap: 16px; margin-bottom: 30px; }
        .logo-square { 
            background: var(--primary-yellow); color: black; font-weight: 900; font-size: 2rem; 
            padding: 5px 12px; border-radius: 4px; line-height: 1;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.3);
        }

        .left-panel { flex: 0 0 65%; display: flex; flex-direction: column; justify-content: center; padding: 0 8%; box-sizing: border-box; }
        .right-panel {
            flex: 0 0 35%; border-left: 1px solid var(--border-color); background: rgba(5, 5, 5, 0.7);
            backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
            display: flex; flex-direction: column; justify-content: center; padding: 50px; box-sizing: border-box;
        }

        h1 { font-size: clamp(2rem, 5vw, 4.5rem); font-weight: 900; line-height: 0.9; margin: 0; letter-spacing: -2px; text-transform: uppercase; }
        .highlight { color: var(--primary-yellow); }
        .sub-text { color: #888; font-size: 1rem; max-width: 500px; margin: 25px 0; line-height: 1.5; font-weight: 300; }

        .input-group { 
            display: flex; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 6px; 
            width: 100%; max-width: 420px; border: 1px solid rgba(255,255,255,0.1);
        }
        input[type="email"] { flex: 1; border: none; background: transparent; padding: 12px; font-size: 0.9rem; color: white; outline: none; font-family: 'Roboto Mono', monospace; }
        .btn-submit { background: var(--primary-yellow); color: black; border: none; padding: 0 25px; font-weight: 900; border-radius: 4px; cursor: pointer; transition: 0.2s; }

        @media (max-width: 1024px) {
            .wrapper { flex-direction: column; overflow-y: auto; height: auto; }
            .left-panel { flex: 1; padding: 60px 5%; align-items: center; text-align: center; }
            .right-panel { width: 100%; border-left: none; border-top: 1px solid var(--border-color); padding: 30px 5%; }
        }
    </style>
</head>
<body>

    <div id="price-bg"></div>
    <canvas id="candleCanvas"></canvas>
    <div class="overlay"></div>

    <div class="wrapper">
        <div class="left-panel">
            <div class="brand-wrapper">
                <div class="logo-square">VA</div>
                <div style="font-size: 1.2rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;">RESEARCH.TRADE</div>
            </div>
            <h1>SYSTEMATIC<br><span class="highlight">ALPHA TERMINAL</span></h1>
            <p class="sub-text">Proprietary quantitative modeling and institutional technical research. Access the terminal during the restricted alpha phase.</p>
            <form id="launch-form" class="input-group">
                <input type="email" placeholder="ACCESS CODE (EMAIL)" required>
                <button type="submit" class="btn-submit">JOIN</button>
            </form>
        </div>

        <div class="right-panel">
            <div style="font-size: 0.65rem; color: var(--primary-yellow); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px;">
                <div style="width: 6px; height: 6px; background: var(--primary-yellow); border-radius: 50%; box-shadow: 0 0 10px var(--primary-yellow);"></div> 
                Institutional Feed
            </div>
            <div id="tip-text" style="font-family: 'Roboto Mono', monospace; font-size: 0.9rem; line-height: 1.5; color: #ddd; min-height: 80px;">Initialising data streams...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('candleCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, chartGroups = [];
        
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            chartGroups = [];
            
            // Create 3 independent chart lanes
            for(let g=0; g<3; g++) {
                let candles = [];
                const spacing = 35;
                let lastClose = (height / 4) * (g + 1);
                for (let i = 0; i < Math.ceil(width / spacing) + 5; i++) {
                    const open = lastClose;
                    const close = open + (Math.random() - 0.5) * 80;
                    candles.push({ 
                        x: i * spacing, open, close, 
                        high: Math.min(open, close) - Math.random() * 25, 
                        low: Math.max(open, close) + Math.random() * 25
                    });
                    lastClose = close;
                }
                chartGroups.push(candles);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            chartGroups.forEach((candles, gIdx) => {
                const opacity = 0.15 - (gIdx * 0.03);
                
                // Draw Line for this chart
                ctx.beginPath();
                ctx.strokeStyle = `rgba(255, 204, 0, ${opacity})`;
                ctx.lineWidth = 1;
                candles.forEach((c, i) => {
                    const y = (c.open + c.close) / 2;
                    if(i === 0) ctx.moveTo(c.x, y); else ctx.lineTo(c.x, y);
                });
                ctx.stroke();

                // Draw Small Candlesticks
                candles.forEach((c) => {
                    const isBull = c.close < c.open;
                    ctx.fillStyle = isBull ? `rgba(0, 255, 136, ${opacity + 0.2})` : `rgba(255, 68, 68, ${opacity + 0.2})`;
                    
                    // Body (Smaller size: 12px)
                    ctx.fillRect(c.x, Math.min(c.open, c.close), 12, Math.max(Math.abs(c.open - c.close), 1));
                    
                    // High/Low Price labels (randomly appearing)
                    if(Math.random() > 0.99) {
                        ctx.font = '8px Roboto Mono';
                        ctx.fillText((c.high).toFixed(2), c.x, c.high - 5);
                    }

                    // Pulse animation
                    c.open += (Math.random() - 0.5) * 0.6;
                    c.close += (Math.random() - 0.5) * 0.6;
                });
            });
            
            requestAnimationFrame(draw);
        }

        /* --- LIVE PRICE MATRIX --- */
        function initPriceBg() {
            const symbols = ['XAUUSD', 'BTCUSDT', 'SPX', 'NDX', 'ETH', 'DXY', 'OIL', 'GOLD', 'AAPL', 'TSLA', 'US10Y'];
            const container = document.getElementById('price-bg');
            let rows = [];
            for(let i=0; i<30; i++) {
                let rowData = [];
                for(let j=0; j<12; j++) {
                    rowData.push({
                        sym: symbols[Math.floor(Math.random() * symbols.length)],
                        val: (Math.random() * 2000 + 500).toFixed(2),
                        chg: (Math.random() * 4 - 2).toFixed(2)
                    });
                }
                rows.push(rowData);
            }

            function update() {
                let html = '';
                rows.forEach(row => {
                    let rowHtml = '<div>';
                    row.forEach(item => {
                        // Randomly shift prices
                        if(Math.random() > 0.8) item.val = (parseFloat(item.val) + (Math.random() - 0.5)).toFixed(2);
                        const color = item.chg > 0 ? 'rgba(0,255,136,0.1)' : 'rgba(255,68,68,0.1)';
                        rowHtml += `<span style="color:${color}">${item.sym} ${item.val}</span> &nbsp;&nbsp;&nbsp; `;
                    });
                    rowHtml += '</div>';
                    html += rowHtml;
                });
                container.innerHTML = html;
            }
            setInterval(update, 1000);
            update();
        }

        window.addEventListener('resize', init);
        init(); draw(); initPriceBg();

        const tips = [
            "STRATEGY: Monitoring H4 supply zone on XAUUSD for re-entry.",
            "ANALYSIS: Liquidity grab confirmed at $67,200 support range.",
            "SETUP: Fibonacci 0.618 retracement holding on ETHUSD.",
            "INSIGHT: Institutional buy-side order flow at major pivots.",
            "ALERT: DXY showing exhaustion; anticipate risk-on move.",
            "MARKET: High-frequency volatility detected in tech sector."
        ];
        let tipIdx = 0;
        function rotateTips() {
            const el = document.getElementById('tip-text');
            el.style.opacity = 0;
            setTimeout(() => {
                el.textContent = tips[tipIdx];
                el.style.opacity = 1;
                tipIdx = (tipIdx + 1) % tips.length;
            }, 500);
        }
        setInterval(rotateTips, 4500); rotateTips();
    </script>
</body>
</html>
